<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p.highlight{
            color:red;
        }
        input[type="password"]{
            background-color: #efefef;
        }
        button:hover{
            background-color: green;
        }
        li:nth-child(even){
            color:blue;
        }
        h2::before{
            content:"★";
            color: gold;
        }
        p::after{
            content:"!";
            color: pink;
        }
        p::first-letter{
            font-size: 2em;
            color: rgb(125, 209, 0);
        }
        h1~p{
            color:blue;
            font-style: italic;
        }
        a[href$=".pdf"]{
            color:red;
            text-decoration: none;
        }
        p{
            text-align:center;
            font-weight:bold;
        }
        .card{
            width: 200px;
            height:100px;
            border: 2px solid gray;
            border-radius: 10px;
            box-sizing: border-box; /* padding과 border를 포함한 크기 계산 */
            background-color: lightgray;
            padding: 20px;
            text-align: center;
            background-image: url(sky.jpg);
            background-size:contain;
            background-repeat: no-repeat;
            /* cover: 배경 이미지가 카드 전체를 덮도록 설정, 그러나 비율이 깨지기도 함 
            contain: 배경 이미지가 카드 내부에 맞도록 설정 */
            /* 위치 설정은 부모를 relative로 설정하고 자식을 absolute로 설정*/
        }
        .left{
            float:left;
            width: 100px;
            background-color: skyblue;
        }
        .right{
            float: left;
            width:100px;
            background-color: pink;
        }
        .text{
            clear:both;
            /* float 요소의 영향을 받지 않도록 설정하여 두 박스 아래에 위치하도록 함 */
        }
    </style>
</head>
<body>
    <div class="left">왼쪽 박스</div>
    <div class="right">오른쪽 박스</div>
    <div class="text">이 문장은 두 박스 아래쪽에 오게 하세요.</div>
    <div class="card">카드 박스</div>
    <p>일반 문단</p>
    <p class="highlight">강조 문단</p>
    <input type="text" placeholder="아이디 입력">
    <input type="password" placeholder="비밀번호 입력">
    <button>제출</button>
    <ul>
        <li>아이템 1</li>
        <li>아이템 2</li>
        <li>아이템 3</li>
        <li>아이템 4</li>
    </ul>
    <h2>공지사항</h2>
    <h2>이벤트</h2>
    <h1>제목</h1>
    <p>첫 번째 단락</p>
    <p>두 번째 단락</p>
    <ul>
        <li><a href="report.pdf">보고서</a></li>
        <li><a href="image.png">이미지</a></li>
    </ul>
</body>
</html>
